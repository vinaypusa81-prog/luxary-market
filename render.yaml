    runtime: node
    plan: free
    rootDir: admin-panel/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_f1eXjoOC9hLd@ep-dry-smoke-ahipxktt-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: MONGODB_URI
        value: mongodb+srv://vinaypusa81_db_user:M7pRV3dBiwVkRPWG@cluster0.job2whs.mongodb.net/luxemarket_admin?retryWrites=true&w=majority
